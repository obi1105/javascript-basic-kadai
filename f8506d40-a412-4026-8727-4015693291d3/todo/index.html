<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ToDOアプリ（CRUD）</title>
	<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
	<header>
		<h1>Todo アプリ（CRUD）</h1>
	</header>
	<main>
		<section>
			<form action="" name="form1">
				<!-- 入力フォーム -->
				<h2>ToDo新規追加</h2>
				<div class="form-area">
					<input id="todo-input"  name="addtext" type="text" placeholder="新しいタスクを入力">
					<button id="add-btn" type="button">追加</button>
				</div>
			</form>
		</section>
		<section>
			<h2>ToDO一覧</h2>
			<ul id="todo-list">

			</ul>
		</section>
	</main>

	<!-- 一覧表示 -->
	<script src="assets/js/app.js"></script>
</body>
</html>
